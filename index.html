<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>郵便番号インクリメンタルサーチ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">KENALL SEARCH</p>
      <h1>郵便番号インクリメンタルサーチ</h1>
      <p class="subtext">郵便番号・都道府県・市区町村・町域でリアルタイム検索</p>
    </header>

    <section class="controls">
      <label for="query" class="label">検索ワード</label>
      <div class="query-row">
        <input
          id="query"
          class="query"
          type="text"
          autocomplete="off"
          placeholder="例: 0600041 / 札幌 / 南一条"
        />
        <button id="clearQuery" class="clear-btn" type="button">クリア</button>
      </div>

      <div class="meta-row">
        <p id="status" class="status">データを読み込み中...</p>
        <label class="limit-wrap" for="limit">
          表示件数
          <select id="limit" class="limit">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
      </div>

      <details class="manual-load">
        <summary>自動読込に失敗した場合</summary>
        <p>ブラウザ制限で `kenall.json` が読めない場合は、手動でファイルを選択してください。</p>
        <input id="jsonFile" type="file" accept=".json,application/json" />
      </details>
    </section>

    <section>
      <ul id="results" class="results"></ul>
    </section>
  </main>

  <template id="resultItemTemplate">
    <li class="result-item">
      <div class="raw-line"></div>
    </li>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
